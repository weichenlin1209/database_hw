<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="container header-inner">
      <h1>Shop</h1>
      <nav>
        <button id="adminBtn" class="btn-link" style="display:none" onclick="location.href='/admin.html'">Admin Panel</button>
        <span id="userInfo" style="display:none">Logged in as: <strong id="usernameDisplay"></strong></span>
        <button id="loginBtn" onclick="showModal('loginModal')">Login</button>
        <button id="registerBtn" onclick="showModal('registerModal')">Register</button>
        <button id="logoutBtn" style="display:none" onclick="logout()">Logout</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <section id="productsSection">
      <h2>Products</h2>
      <div id="productList" class="product-grid"></div>
    </section>

    <aside id="cartSection" style="display:none">
      <h2>Your Cart</h2>
      <div id="cartItems"></div>
      <div id="cartTotal"></div>
      <button id="checkoutBtn" onclick="checkout()">Checkout</button>
    </aside>
  </main>

  <div id="loginModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="hideModal('loginModal')">&times;</span>
      <h2>Login</h2>
      <form id="loginForm">
        <input type="text" id="loginUsername" placeholder="Username" required>
        <input type="password" id="loginPassword" placeholder="Password" required>
        <button type="submit">Login</button>
        <p class="error" id="loginError"></p>
      </form>
    </div>
  </div>

  <div id="registerModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="hideModal('registerModal')">&times;</span>
      <h2>Register</h2>
      <form id="registerForm">
        <input type="text" id="registerUsername" placeholder="Username" required>
        <input type="password" id="registerPassword" placeholder="Password" required>
        <button type="submit">Register</button>
        <p class="error" id="registerError"></p>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
