<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Product Management</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="container header-inner">
      <h1>Admin Panel</h1>
      <nav>
        <button class="btn-link" onclick="location.href='/'">Back to Shop</button>
        <span id="userInfo" style="display:none">Logged in as: <strong id="usernameDisplay"></strong></span>
        <button id="logoutBtn" onclick="logout()">Logout</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <section id="adminProductForm">
      <h2 id="formTitle">Add Product</h2>
      <form id="productForm">
        <input type="hidden" id="editProductId">
        <input type="text" id="productName" placeholder="Product Name" required>
        <input type="number" id="productPrice" placeholder="Price" step="0.01" min="0.01" required>
        <input type="number" id="productStock" placeholder="Stock" min="0" required>
        <button type="submit" id="formSubmitBtn">Add Product</button>
        <button type="button" id="formCancelBtn" style="display:none" onclick="cancelEdit()">Cancel</button>
      </form>
    </section>

    <section id="adminProductList">
      <h2>All Products</h2>
      <table id="productTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="productTableBody"></tbody>
      </table>
    </section>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
